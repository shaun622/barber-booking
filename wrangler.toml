name = "balis-barber-booking"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

[[d1_databases]]
binding = "DB"
database_name = "balis_barber"
database_id = "56e33fa2-be0a-4f94-aa74-d76e798bf76b"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "66d14b22c8d546a6b6e0d0a80d1bb560"

[[kv_namespaces]]
binding = "SLOT_LOCKS"
id = "f84874b840494b04b324d770eda25641"

[vars]
SHOP_TZ = "Asia/Makassar"
SHOP_WHATSAPP = "+6281337995251"
# EMAIL_FROM, EMAIL_TO_OWNER, RESEND_API_KEY are set as Pages secrets (not here).

# Secrets (DO NOT put real values here — use `wrangler pages secret put NAME`):
#   TURNSTILE_SECRET, ADMIN_PASSWORD_HASH, SESSION_SECRET,
#   RESEND_API_KEY, WHATSAPP_TOKEN, WHATSAPP_PHONE_ID, WHATSAPP_OWNER_NUMBER
#
# Public vars (set in dashboard Pages > Settings > Env vars or here):
#   TURNSTILE_SITE_KEY
